name: Feature request
description: Suggest a new capability or enhancement
labels: ["type/feature", "status/needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Propose features with clear user value and acceptance criteria.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are users facing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the expected behavior/workflow.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Bullet list of verifiable outcomes.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend API
        - Chrome Extension Popup
        - In-page Widget
        - Documentation
        - DevOps/CI
        - Other
    validations:
      required: true
