<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codeat Analyzer Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="container" style="width: 560px; max-width: 100%;">
    <section class="card">
      <h1>Codeat Analyzer Settings</h1>

      <label for="apiBaseUrl">API Base URL</label>
      <input id="apiBaseUrl" type="text" placeholder="http://localhost:3502">

      <label for="analyzePath">Analyze Path</label>
      <input id="analyzePath" type="text" placeholder="/api/v1/analyze">

      <button id="save" class="primary" type="button">Save</button>
      <p id="status" class="status"></p>
    </section>
  </main>

  <script src="options.js"></script>
</body>
</html>
